name: Deploy
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      DENO_DEPLOY_TOKEN:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Prepare environment variables for HTML mails bundler
        run: echo "CLIENT_URL=${{ vars.CLIENT_URL }}" >> .env

      - name: Bundle HTML mails templates
        run: deno task bundle-html-mails-templates:prod

      - name: Upload to Deno Deploy
        run: deno deploy --app mecha-agent --token "${{ secrets.DENO_DEPLOY_TOKEN }}" --prod